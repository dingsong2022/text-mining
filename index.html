<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 영어 글 분석기</title>
<style>
  :root{--primary:#2F5597;--accent:#16324F;--bg:#D9EAF7;--body:#333;--card:#fff;--line:#cdd9ea;
    --lex:#00827E;--syn:#5E35B1;--coh:#C2691C;--bar:#7C6FE0;}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Noto Serif KR","Batang",serif;color:var(--body);background:var(--bg);padding:18px;}
  .wrap{max-width:1100px;margin:0 auto;}
  h1{font-size:24px;color:var(--accent);margin:0 0 2px;}
  .sub{color:#5a6b80;margin:0 0 12px;font-size:14px;}
  .guard{background:#FFF6E9;border:1px solid #E6B873;border-radius:10px;padding:10px 14px;font-size:14px;margin-bottom:16px;color:#8a5a14;}
  .guard b{color:#C2691C;}
  .tabs{display:flex;gap:8px;margin-bottom:14px;}
  .tab{padding:8px 16px;border:1px solid var(--line);background:#fff;border-radius:20px;cursor:pointer;font-size:14px;font-family:inherit;color:var(--body);}
  .tab.on{background:var(--primary);color:#fff;border-color:var(--primary);}
  .panel{display:none;}.panel.on{display:block;}
  textarea{width:100%;min-height:110px;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:14px;font-family:inherit;resize:vertical;}
  .lbl{font-size:13px;color:var(--primary);font-weight:bold;margin:8px 0 4px;}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .btn{margin-top:12px;padding:11px 22px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-family:inherit;}
  .btn:hover{background:#26477f;}
  .cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:16px 0;}
  .c{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 8px;text-align:center;}
  .c .k{font-size:12px;color:#5a6b80;margin-bottom:5px;}.c .v{font-size:22px;font-weight:bold;color:var(--primary);}
  .c .d{font-size:12px;margin-top:3px;font-weight:bold;}.up{color:var(--lex);}.down{color:var(--coh);}
  .sec{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;}
  .sec h3{margin:0 0 4px;font-size:16px;}
  .sec .axis{font-size:12px;color:#fff;border-radius:10px;padding:2px 10px;display:inline-block;margin-bottom:10px;}
  .ax-lex{background:var(--lex);}.ax-syn{background:var(--syn);}.ax-coh{background:var(--coh);}
  .grid2{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;}
  @media(max-width:760px){.cards{grid-template-columns:repeat(2,1fr)}.grid2,.two{grid-template-columns:1fr}}
  .stat{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eef0f4;font-size:14px;}
  .stat b{color:var(--primary);}
  .bar{display:flex;align-items:center;margin:4px 0;font-size:13px;}
  .bar .w{width:110px;flex:none;text-align:right;padding-right:8px;}
  .bar .t{height:16px;background:var(--bar);border-radius:4px;}.bar .n{padding-left:7px;color:#5a6b80;}
  .toggle{font-size:13px;margin-bottom:8px;}
  .chip{display:inline-block;background:#EEF4FB;border:1px solid var(--line);border-radius:14px;padding:3px 10px;margin:3px;font-size:13px;}
  .hint{font-size:12px;color:#8a97a8;margin-top:8px;}
  .approx{font-size:11px;color:#b07a2a;background:#FBF1E2;border-radius:6px;padding:1px 7px;margin-left:6px;}
  .mini{font-size:13px;line-height:1.55;color:#4c5b6d;}
  .note{background:#F6FAFE;border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin:8px 0;font-size:13px;line-height:1.55;}
  .warn{background:#FFF6E9;border-color:#E6B873;color:#7c5318;}
  .list{margin:6px 0 0;padding-left:18px;font-size:13px;line-height:1.6;}
  .list li{margin:3px 0;}
  .btn.alt{background:#00827E;}
  .btn.alt:hover{background:#006b68;}
  .btn:disabled{background:#9fb0c5;cursor:not-allowed;}
  .loading{display:inline-block;margin-left:8px;color:#5a6b80;font-size:13px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>📊 내 영어 글 분석기</h1>
  <p class="sub">내가 쓴 영어 글을 어휘·문장(통사)·연결(응집성) 세 가지로 들여다봅니다.</p>
  <div class="guard">이 화면은 <b>계산만</b> 합니다. “무엇을 잘했는지, 무엇을 고칠지”는 알려주지 않아요. <b>데이터를 보고 무슨 뜻인지 정하는 건 여러분의 몫</b>입니다.</div>
  <div class="tabs">
    <button class="tab on" data-tab="single">내 글 분석</button>
    <button class="tab" data-tab="deep">글 특징 보기</button>
    <button class="tab" data-tab="compare">처음 ↔ 최근 비교</button>
  </div>
  <div class="panel on" id="single">
    <div class="lbl">내 영어 글</div>
    <textarea id="t1" placeholder="여기에 내 영어 글을 붙여넣으세요."></textarea>
    <button class="btn" onclick="runSingle()">분석하기</button>
    <div id="out1"></div>
    <div class="sec" style="margin-top:14px">
      <h3>🔎 용례 보기 — 한 단어가 쓰인 문장 모두 펼치기</h3>
      <span class="axis ax-syn">쓰임의 질</span>
      <div style="margin:6px 0 4px">
        <input id="concWord" placeholder="단어 입력 (예: I, good, happy)"
          style="padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;width:240px">
        <button class="btn" style="margin-top:0;padding:8px 16px" onclick="showConc()">문장 모으기</button>
      </div>
      <div id="concOut"></div>
    </div>
  </div>
  <div class="panel" id="deep">
    <div class="lbl">내 영어 글</div>
    <textarea id="tDeep" placeholder="여기에 내 영어 글을 붙여넣으세요."></textarea>
    <button class="btn alt" onclick="runAiDeep()">AI로 분석하기</button><span id="aiLoading" class="loading"></span>
    <div class="hint">CEFR 수준·어법·내용·단락 구성·총평을 AI가 분석합니다. (처음↔최근 비교는 위의 ‘처음 ↔ 최근 비교’ 탭에서)</div>
    <div id="outAi"></div>
  </div>
  <div class="panel" id="compare">
    <div class="two">
      <div><div class="lbl">A — 처음에 쓴 글</div><textarea id="tA" placeholder="학기 초에 쓴 글"></textarea></div>
      <div><div class="lbl">B — 최근에 쓴 글</div><textarea id="tB" placeholder="최근에 쓴 글"></textarea></div>
    </div>
    <button class="btn" onclick="runCompare()">비교하기</button>
    <div id="out2"></div>
  </div>
</div>
<script>
const STOP=new Set("a an the and or but to of in on at for with as by from i you we he she it they them me my our your his her their its is am are was were be been being do does did have has had will would shall can could may might must should this that these those then so not no nor also very just only even more most much many some any all both there here what which who whom whose when where why how than too about into onto over under up down out off again further once if because while during before after above below between".split(" "));
const AI_ENDPOINT="https://us-central1-speaking-app-v2-6bcd5.cloudfunctions.net/analyzeWriting";
const CONN=["and","but","or","so","yet","because","although","though","while","when","if","unless","since","after","before","until","however","therefore","also","then","first","finally","moreover","besides"];
const norm=s=>s.toLowerCase().match(/[a-z]+(?:'[a-z]+)?/g)||[];
const esc=s=>String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
function sentObjs(t){const m=t.match(/[^.!?]+[.!?]+/g);if(m)return m.map(s=>({raw:s.trim(),end:s.trim().slice(-1)}));return t.trim()?[{raw:t.trim(),end:"."}]:[];}
function paras(t){return t.split(/\n\s*\n/).map(x=>x.trim()).filter(Boolean);}
function analyze(text){
  const w=norm(text),st=sentObjs(text),total=w.length,distinct=new Set(w).size;
  const f={};for(const x of w)f[x]=(f[x]||0)+1;
  const E=Object.entries(f).sort((a,b)=>b[1]-a[1]);
  const hapax=E.filter(([,n])=>n===1).length;
  const top5=total?+((E.slice(0,5).reduce((s,[,n])=>s+n,0))/total*100).toFixed(1):0;
  const avgLen=total?+(w.reduce((s,x)=>s+x.length,0)/total).toFixed(1):0;
  const longR=total?+(w.filter(x=>x.length>=7).length/total*100).toFixed(1):0;
  const lens=st.map(s=>norm(s.raw).length);
  const firsts={};let iS=0;
  st.forEach(s=>{const fw=norm(s.raw)[0];if(fw){firsts[fw]=(firsts[fw]||0)+1;if(fw==="i")iS++;}});
  const firstTop=Object.entries(firsts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const types={".":0,"?":0,"!":0};st.forEach(s=>{if(types[s.end]!==undefined)types[s.end]++;});
  const low=" "+text.toLowerCase()+" ";const cf={};let cT=0;
  CONN.forEach(c=>{const re=new RegExp("\\b"+c+"\\b","g");const n=(low.match(re)||[]).length;if(n){cf[c]=n;cT+=n;}});
  return{sentences:st.length,total,distinct,ttr:total?+(distinct/total*100).toFixed(1):0,mls:st.length?+(total/st.length).toFixed(2):0,
    all:E,content:E.filter(([k])=>!STOP.has(k)),hapax,hapaxR:distinct?+(hapax/distinct*100).toFixed(1):0,top5,avgLen,longR,
    minL:lens.length?Math.min(...lens):0,maxL:lens.length?Math.max(...lens):0,firstTop,iS,iSR:st.length?+(iS/st.length*100).toFixed(1):0,
    types,cT,cN:Object.keys(cf).length,cf};
}
const card=(k,v,d)=>`<div class="c"><div class="k">${k}</div><div class="v">${v}</div>${d||""}</div>`;
const headCards=a=>`<div class="cards">${card("문장 수",a.sentences)}${card("단어 수",a.total)}${card("평균 문장 길이",a.mls)}${card("서로 다른 단어",a.distinct)}${card("어휘 다양성(TTR)",a.ttr+"%")}</div>`;
function bars(list){const t=list.slice(0,10),m=t.length?t[0][1]:1;return t.map(([w,n])=>`<div class="bar"><div class="w">${w}</div><div class="t" style="width:${Math.max(6,n/m*100)}%"></div><div class="n">${n}</div></div>`).join("");}
let CUR={};
function reFreq(id,c){const a=CUR[id];document.getElementById(id+"-bar").innerHTML=bars(c?a.content:a.all);}
function lexSec(a,id){return `<div class="sec"><h3>🟢 어휘 — 얼마나 다양한 말을 썼나</h3><span class="axis ax-lex">어휘 다양성</span>
  <div class="grid2"><div>
    <div class="stat"><span>한 번만 쓴 단어</span><b>${a.hapax}개 (${a.hapaxR}%)</b></div>
    <div class="stat"><span>가장 많이 쓴 5개 단어가 차지하는 비중</span><b>${a.top5}%</b></div>
    <div class="stat"><span>평균 단어 길이 <span class="approx">근사 신호</span></span><b>${a.avgLen}자</b></div>
    <div class="stat"><span>긴 단어(7자↑) 비율 <span class="approx">근사 신호</span></span><b>${a.longR}%</b></div>
  </div><div>
    <div class="toggle"><label><input type="radio" name="${id}" onclick="reFreq('${id}',true)" checked> 핵심 단어</label>
    &nbsp;<label><input type="radio" name="${id}" onclick="reFreq('${id}',false)"> 모든 단어</label></div>
    <div id="${id}-bar">${bars(a.content)}</div>
  </div></div></div>`;}
function synSec(a){const tp=a.firstTop.map(([w,n])=>`<span class="chip">${w} · ${n}</span>`).join("");
  return `<div class="sec"><h3>🟣 문장 — 어떻게 문장을 만들었나</h3><span class="axis ax-syn">통사</span>
  <div class="grid2"><div>
    <div class="stat"><span>가장 짧은 문장 / 가장 긴 문장</span><b>${a.minL}단어 / ${a.maxL}단어</b></div>
    <div class="stat"><span>I로 시작한 문장</span><b>${a.iS}개 (${a.iSR}%)</b></div>
    <div class="stat"><span>평서문 . / 의문문 ? / 감탄문 !</span><b>${a.types["."]} / ${a.types["?"]} / ${a.types["!"]}</b></div>
  </div><div><div class="lbl">문장을 시작한 단어</div>${tp||'<span class="hint">문장이 없습니다</span>'}</div></div></div>`;}
function cohSec(a){const ch=Object.entries(a.cf).sort((x,y)=>y[1]-x[1]).map(([w,n])=>`<span class="chip">${w} · ${n}</span>`).join("");
  return `<div class="sec"><h3>🟠 연결 — 문장을 얼마나 매끄럽게 이었나</h3><span class="axis ax-coh">응집성</span>
  <div class="grid2"><div>
    <div class="stat"><span>연결어를 쓴 총 횟수</span><b>${a.cT}회</b></div>
    <div class="stat"><span>서로 다른 연결어 종류</span><b>${a.cN}종</b></div>
  </div><div><div class="lbl">내가 쓴 연결어</div>${ch||'<span class="hint">연결어를 찾지 못했어요</span>'}</div></div></div>`;}
function sentenceExamples(text,re,limit=3){
  return sentObjs(text).filter(s=>re.test(s.raw) && (re.lastIndex=0,true)).slice(0,limit).map(s=>esc(s.raw));
}
function grammarSignals(text){
  const checks=[
    {name:"소문자 i",why:"영어에서 나를 뜻하는 I는 대문자로 씁니다.",re:/\bi\b/g},
    {name:"a/an 선택",why:"a와 an 뒤에 오는 소리와 맞는지 확인해 보세요.",re:/\b(a\s+[aeiou]|an\s+[^aeiou\s])/gi},
    {name:"3인칭 단수 동사",why:"he/she/it 뒤 동사에 -s가 필요한 자리인지 확인해 보세요.",re:/\b(he|she|it)\s+(go|like|play|want|need|make|study|watch|eat|live|love|do|have)\b/gi},
    {name:"do/did 뒤 동사",why:"do, does, did 뒤에는 보통 동사의 기본형이 옵니다.",re:/\b(did|didn't|does|doesn't|do|don't)\s+[a-z]+(ed|s)\b/gi},
    {name:"be동사+일반동사",why:"I am agree처럼 be동사와 일반동사가 함께 쓰였는지 확인해 보세요.",re:/\b(am|is|are|was|were)\s+(agree|like|want|go|play|study|eat|make|think|have)\b/gi},
    {name:"반복 단어",why:"같은 단어가 실수로 두 번 이어졌는지 확인해 보세요.",re:/\b([a-z]+)\s+\1\b/gi}
  ];
  const found=checks.map(c=>({name:c.name,why:c.why,examples:sentenceExamples(text,c.re)})).filter(c=>c.examples.length);
  return found;
}
function levelEstimate(a){
  if(a.total<30)return {label:"자료 부족",score:0,why:"단어 수가 적어서 수준을 가늠하기 어렵습니다."};
  let score=0,reasons=[];
  if(a.mls>=8){score++;reasons.push("문장 길이가 어느 정도 있습니다");}
  if(a.mls>=13){score++;reasons.push("긴 문장을 시도합니다");}
  if(a.ttr>=45){score++;reasons.push("서로 다른 단어를 비교적 다양하게 씁니다");}
  if(a.longR>=10){score++;reasons.push("긴 단어 비율이 있습니다");}
  if(a.cN>=3){score++;reasons.push("연결어 종류가 여럿입니다");}
  if(a.sentences>=6){score++;reasons.push("여러 문장으로 내용을 전개합니다");}
  const label=score<=1?"시작 단계":score<=3?"기초-확장 단계":score<=5?"확장 단계":"발전 단계";
  return {label,score,why:reasons.join(", ")||"짧고 단순한 표현이 중심입니다"};
}
function paragraphProfile(text){
  const p=paras(text),sentPer=p.map(x=>sentObjs(x).length),avg=p.length?+(sentPer.reduce((s,n)=>s+n,0)/p.length).toFixed(1):0;
  const low=text.toLowerCase();
  const order=(low.match(/\b(first|second|third|finally|in conclusion|for example|because|however|therefore|also)\b/g)||[]);
  const starts=p.map(x=>norm(x)[0]).filter(Boolean);
  return {count:p.length,avg,order:[...new Set(order)].slice(0,8),starts};
}
function featureNotes(text,a){
  const notes=[];
  const content=a.content.slice(0,5).map(([w,n])=>`${w}(${n})`).join(", ");
  if(content)notes.push(`중심 단어는 ${content} 쪽으로 모입니다.`);
  if(a.iSR>=40)notes.push(`I로 시작한 문장이 ${a.iSR}%라서, 글이 내 경험/의견 중심으로 보입니다.`);
  if(a.maxL-a.minL>=10)notes.push(`짧은 문장과 긴 문장의 차이가 커서 문장 길이에 변화가 있습니다.`);
  if(a.cT===0)notes.push("연결어가 거의 없어 문장 사이 관계를 독자가 직접 추측해야 할 수 있습니다.");
  if(a.types["?"]>0)notes.push(`질문형 문장을 ${a.types["?"]}개 사용했습니다.`);
  if(a.types["!"]>0)notes.push(`감탄문을 ${a.types["!"]}개 사용해 감정 표현이 드러납니다.`);
  return notes.length?notes:["아직 특징을 잡기에는 글이 짧습니다. 문장을 조금 더 넣어 보세요."];
}
function compareNarrative(A,B){
  if(!A.total||!B.total)return '<div class="note">처음 글과 최근 글을 모두 넣으면 변화 내용을 함께 보여줍니다.</div>';
  const lines=[];
  const add=(label,b,a,unit,upMsg,downMsg)=>{const d=+(b-a).toFixed(2);if(d>0)lines.push(`${label}: ${upMsg} (${a}${unit} → ${b}${unit})`);else if(d<0)lines.push(`${label}: ${downMsg} (${a}${unit} → ${b}${unit})`);else lines.push(`${label}: 거의 비슷합니다 (${a}${unit})`);};
  add("글의 양",B.total,A.total,"단어","더 길어졌습니다","더 짧아졌습니다");
  add("어휘 다양성",B.ttr,A.ttr,"%","서로 다른 단어 사용이 늘었습니다","반복 단어 비중이 커졌을 수 있습니다");
  add("평균 문장 길이",B.mls,A.mls,"","문장을 더 길게 이어 쓰는 경향이 있습니다","문장을 더 짧고 단순하게 쓰는 경향이 있습니다");
  add("연결어 종류",B.cN,A.cN,"종","문장 사이 관계를 더 다양하게 표시합니다","연결 방식이 더 제한적으로 보입니다");
  return `<ul class="list">${lines.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`;
}
function runDeep(){
  const text=document.getElementById("tDeep").value;
  const a=analyze(text),level=levelEstimate(a),pg=paragraphProfile(text),signals=grammarSignals(text),notes=featureNotes(text,a);
  const startChips=a.firstTop.map(([w,n])=>`<span class="chip">${esc(w)} · ${n}</span>`).join("")||'<span class="hint">문장이 없습니다</span>';
  const connChips=Object.entries(a.cf).sort((x,y)=>y[1]-x[1]).map(([w,n])=>`<span class="chip">${esc(w)} · ${n}</span>`).join("")||'<span class="hint">연결어를 찾지 못했어요</span>';
  const grammarHtml=signals.length?signals.map(s=>`<div class="note warn"><b>${esc(s.name)}</b><br>${esc(s.why)}<br>${s.examples.map(e=>`<span class="chip">${e}</span>`).join("")}</div>`).join(""):'<div class="note">자주 확인하는 어법 신호는 크게 보이지 않습니다. 그래도 문맥에 맞는지는 직접 읽으며 확인해 보세요.</div>';
  const A=analyze(document.getElementById("tDeepA").value),B=analyze(document.getElementById("tDeepB").value);
  document.getElementById("outDeep").innerHTML=headCards(a)+
    `<div class="sec"><h3>🟣 문장 시작과 연결어</h3><span class="axis ax-syn">표현 방식</span><div class="grid2"><div><div class="lbl">문장을 시작한 단어</div>${startChips}</div><div><div class="lbl">자주 쓰는 연결어</div>${connChips}</div></div></div>`+
    `<div class="sec"><h3>🟤 자주 확인할 어법 신호</h3><span class="axis ax-coh">점검 신호</span><div class="note">아래 내용은 자동으로 찾은 <b>가능성</b>입니다. 틀렸다고 단정하지 말고 문장 안에서 다시 확인해 보세요.</div>${grammarHtml}</div>`+
    `<div class="sec"><h3>🟠 단락 구성 방식</h3><span class="axis ax-coh">구성</span><div class="grid2"><div><div class="stat"><span>단락 수</span><b>${pg.count}개</b></div><div class="stat"><span>단락당 평균 문장 수</span><b>${pg.avg}문장</b></div></div><div><div class="lbl">순서·예시·결론 신호</div>${pg.order.length?pg.order.map(x=>`<span class="chip">${esc(x)}</span>`).join(""):'<span class="hint">뚜렷한 구성 신호가 적습니다</span>'}</div></div></div>`+
    `<div class="sec"><h3>🔵 내 글의 대략적 수준</h3><span class="axis ax-lex">수준 신호</span><div class="note"><b>${level.label}</b><br>${esc(level.why)}</div><div class="hint">이 수준은 시험 점수가 아니라 단어 수, 문장 길이, 어휘 다양성, 연결어 사용을 바탕으로 한 대략적인 신호입니다.</div></div>`+
    `<div class="sec"><h3>🟢 처음 글과 최근 글의 변화</h3><span class="axis ax-lex">성장 비교</span>${compareNarrative(A,B)}</div>`+
    `<div class="sec"><h3>🔎 그 밖의 내 글 특징</h3><span class="axis ax-syn">관찰</span><ul class="list">${notes.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>`;
}
function listItems(items){
  return items&&items.length?`<ul class="list">${items.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:'<div class="hint">표시할 내용이 없습니다.</div>';
}
function renderAiAnalysis(a){
  const gp=(a.grammarPatterns||[]).map(x=>`<div class="note warn"><b>${esc(x.pattern)}</b><br><span class="mini">근거: ${esc(x.evidence)}</span><br><span class="mini">방향: ${esc(x.suggestion)}</span><br><span class="chip">${esc(x.correctedExample)}</span></div>`).join("")||'<div class="note">뚜렷하게 반복되는 어법 오류는 적게 보입니다.</div>';
  const cf=(a.contentFeatures||[]).map(x=>`<div class="note"><b>${esc(x.feature)}</b><br><span class="mini">근거: ${esc(x.evidence)}</span><br><span class="mini">다음 단계: ${esc(x.nextStep)}</span></div>`).join("")||'<div class="note">내용 특징을 판단하기에는 글이 짧습니다.</div>';
  return `<div class="sec"><h3>🤖 AI 분석 결과</h3><span class="axis ax-lex">CEFR·한국 EFL 기준</span>
    <div class="cards">${card("CEFR",esc(a.cefr?.level||"판단 보류"))}${card("한국 EFL 기준",esc(a.cefr?.koreanEflGrade||"판단 보류"))}${card("확신도",esc(a.cefr?.confidence||"낮음"))}</div>
    <div class="lbl">판단 근거</div>${listItems(a.cefr?.evidence)}
  </div>
  <div class="sec"><h3>🟤 자주 틀리는 어법</h3><span class="axis ax-coh">AI 점검</span>${gp}</div>
  <div class="sec"><h3>🟢 내용상의 특징</h3><span class="axis ax-lex">내용</span>${cf}</div>
  <div class="sec"><h3>🟠 단락과 흐름</h3><span class="axis ax-coh">구성</span>
    <div class="note"><b>단락</b><br>${esc(a.organization?.paragraphing||"")}</div>
    <div class="note"><b>문장 흐름</b><br>${esc(a.organization?.sentenceFlow||"")}</div>
    <div class="note"><b>다음 단계</b><br>${esc(a.organization?.nextStep||"")}</div>
  </div>`;
}
async function runAiDeep(){
  const out=document.getElementById("outAi"),loading=document.getElementById("aiLoading");
  const currentText=document.getElementById("tDeep").value.trim();
  if(!AI_ENDPOINT){
    out.innerHTML='<div class="sec"><h3>🤖 AI 분석 연결 필요</h3><div class="note warn">AI 분석 서버 주소가 아직 연결되지 않았습니다. Cloudflare Worker를 배포한 뒤 AI_ENDPOINT에 Worker 주소를 넣으면 이 버튼이 작동합니다.</div></div>';
    return;
  }
  if(currentText.split(/\s+/).filter(Boolean).length<5){
    out.innerHTML='<div class="sec"><div class="note warn">분석할 영어 글을 조금 더 입력해 주세요.</div></div>';
    return;
  }
  loading.textContent="AI가 분석 중입니다...";
  out.innerHTML="";
  try{
    const res=await fetch(AI_ENDPOINT,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({
      currentText
    })});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||"AI 분석에 실패했습니다.");
    out.innerHTML=renderAiAnalysis(data.analysis);
  }catch(e){
    out.innerHTML=`<div class="sec"><h3>AI 분석 오류</h3><div class="note warn">${esc(e.message||e)}</div></div>`;
  }finally{
    loading.textContent="";
  }
}
function runSingle(){const a=analyze(document.getElementById("t1").value);CUR["s"]=a;
  document.getElementById("out1").innerHTML=headCards(a)+lexSec(a,"s")+synSec(a)+cohSec(a);}
function showConc(){
  const w=(document.getElementById("concWord").value||"").trim().toLowerCase();
  const out=document.getElementById("concOut");
  if(!w){out.innerHTML='<div class="hint">단어를 입력하세요.</div>';return;}
  const st=sentObjs(document.getElementById("t1").value);
  const hits=st.filter(s=>norm(s.raw).includes(w));
  if(!hits.length){out.innerHTML=`<div class="hint">‘${w}’이(가) 쓰인 문장을 찾지 못했어요.</div>`;return;}
  const re=new RegExp("\\b("+w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")\\b","gi");
  out.innerHTML=`<div class="stat"><span>‘${w}’이(가) 쓰인 문장</span><b>${hits.length}개</b></div>`+
    hits.map(s=>`<div style="padding:6px 0;border-bottom:1px solid #eef0f4;font-size:14px">`+
      s.raw.replace(re,'<b style="color:var(--syn)">$1</b>')+`</div>`).join("")+
    `<div class="hint">같은 단어를 늘 비슷한 식으로 쓰는지 살펴보세요. (판단은 내가!)</div>`;
}
function delta(b,a,u){const d=+(b-a).toFixed(2);if(d===0)return '<div class="d">±0</div>';return `<div class="d ${d>0?'up':'down'}">${d>0?'▲ +':'▼ '}${d}${u||''}</div>`;}
function runCompare(){const A=analyze(document.getElementById("tA").value),B=analyze(document.getElementById("tB").value);CUR["cA"]=A;CUR["cB"]=B;
  const cc=`<div class="cards">
    ${card("어휘 다양성(TTR)",A.ttr+"→"+B.ttr+"%",delta(B.ttr,A.ttr,"%p"))}
    ${card("한 번만 쓴 단어 비율",A.hapaxR+"→"+B.hapaxR+"%",delta(B.hapaxR,A.hapaxR,"%p"))}
    ${card("평균 문장 길이",A.mls+"→"+B.mls,delta(B.mls,A.mls))}
    ${card("I로 시작한 문장",A.iSR+"→"+B.iSR+"%",delta(B.iSR,A.iSR,"%p"))}
    ${card("연결어 종류",A.cN+"→"+B.cN+"종",delta(B.cN,A.cN,"종"))}
  </div>`;
  document.getElementById("out2").innerHTML=cc+
   `<div class="grid2"><div>${lexSec(A,"cA").replace("어휘 — 얼마나 다양한 말을 썼나","A(처음) 어휘")}</div><div>${lexSec(B,"cB").replace("어휘 — 얼마나 다양한 말을 썼나","B(최근) 어휘")}</div></div>`+
   `<div class="grid2"><div>${synSec(A).replace("문장 — 어떻게 문장을 만들었나","A(처음) 문장")}</div><div>${synSec(B).replace("문장 — 어떻게 문장을 만들었나","B(최근) 문장")}</div></div>`+
   `<div class="grid2"><div>${cohSec(A).replace("연결 — 문장을 얼마나 매끄럽게 이었나","A(처음) 연결")}</div><div>${cohSec(B).replace("연결 — 문장을 얼마나 매끄럽게 이었나","B(최근) 연결")}</div></div>`;}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));document.querySelectorAll(".panel").forEach(x=>x.classList.remove("on"));t.classList.add("on");document.getElementById(t.dataset.tab).classList.add("on");});
</script>
